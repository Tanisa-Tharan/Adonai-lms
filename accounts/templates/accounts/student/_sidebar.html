{% load static %}
<aside class="sidebar" style="display: flex; width: 300px; height: 1112px; padding: 16px 16px 42px 16px; flex-direction: column; align-items: flex-start; gap: 8px; border-right: 1px solid #E7E5E4; background: #FFF;">
  <div class="sidebar-main">
    <div class="brand">
      <h1 style="margin: 0; justify-content: center; display: flex; flex-direction: column; line-height: 28px; letter-spacing: -1px;">
        <span style="color: #000; font-family: Lexend; font-size: 30px; font-style: normal; font-weight: 400;">Adonai </span><span style="color: #921F22; font-family: 'BackBone Melavita', serif; font-size: 30px; font-style: italic; font-weight: 400;">Bible School</span>
      </h1>
      <p style="display: flex; width: 136.98px; height: 20px; flex-direction: column; justify-content: center; flex-shrink: 0; margin: 0; color: #78716C; font-family: Roboto; font-size: 10px; font-style: normal; font-weight: 400; line-height: 20px; letter-spacing: 1px; text-transform: uppercase;">
        {% if request.user.role == 'ADMIN' %}
          ADMIN PORTAL
        {% elif request.user.role == 'FACULTY' %}
          FACULTY PORTAL
        {% elif request.user.role == 'STUDENT' %}
          STUDENT PORTAL
        {% elif request.user.role == 'SUPERVISOR' %}
          SUPERVISOR PORTAL
        {% endif %}
      </p>
    </div>

    <nav class="nav" aria-label="Main Navigation" style="align-self: stretch; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; width: 100%;">
      <button class="tab-link {% if active_tab == 'dashboard' %}active{% endif %}" type="button" data-tab="dashboard" style="align-self: stretch; display: flex; padding: 12px 16px; align-items: center; gap: 12px; border: 0; border-radius: 8px; background: {% if active_tab == 'dashboard' %}rgba(113, 2, 14, 0.06){% else %}transparent{% endif %}; color: {% if active_tab == 'dashboard' %}#921F22{% else %}#57534E{% endif %}; font-size: 16px; font-family: Roboto; font-weight: 600; line-height: 20px; cursor: pointer; text-align: left;">
        <span style="width: 18px; height: 18px; display: inline-flex; flex: 0 0 18px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" focusable="false">
            <path d="M10 6V0H18V6H10ZM0 10V0H8V10H0ZM10 18V8H18V18H10ZM0 18V12H8V18H0ZM2 8H6V2H2V8ZM12 16H16V10H12V16ZM12 4H16V2H12V4ZM2 16H6V14H2V16Z" fill="#921F22"/>
          </svg>
        </span>
        <span>DASHBOARD</span>
      </button>
      <button class="tab-link {% if active_tab == 'modules' %}active{% endif %}" type="button" data-tab="modules" style="align-self: stretch; display: flex; padding: 12px 16px; align-items: center; gap: 12px; border: 0; border-radius: 8px; background: {% if active_tab == 'modules' %}rgba(113, 2, 14, 0.06){% else %}transparent{% endif %}; color: {% if active_tab == 'modules' %}#921F22{% else %}#57534E{% endif %}; font-size: 16px; font-family: Roboto; font-weight: 600; line-height: 20px; cursor: pointer; text-align: left;">MODULES</button>
    </nav>
  </div>

  <div class="sidebar-footer">
    <form method="post" action="{% url 'logout' %}" class="logout-form">
      {% csrf_token %}
      <button type="submit">Logout</button>
    </form>
  </div>
</aside>
