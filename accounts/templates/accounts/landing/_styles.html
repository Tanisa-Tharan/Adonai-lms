<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #921F22;
    --red-dark: #7a1a1d;
    --red-light: #fdf2f2;
    --ink: #1C1917;
    --ink-mid: #44403C;
    --ink-light: #78716C;
    --line: #E7E5E4;
    --bg: #F9FAFB;
    --white: #FFFFFF;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--ink);
    background: var(--white);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  .l-nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 0 5%; height: 68px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .l-nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .l-nav-brand-icon {
    width: 36px; height: 36px; background: var(--red);
    border-radius: 8px; display: grid; place-items: center; flex-shrink: 0;
  }
  .l-nav-brand-text { font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.2; }
  .l-nav-brand-sub { font-size: 11px; font-weight: 500; color: var(--ink-light); letter-spacing: 0.04em; text-transform: uppercase; }
  .l-nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
  .l-nav-links a { font-size: 14px; font-weight: 500; color: var(--ink-mid); text-decoration: none; transition: color 0.15s; }
  .l-nav-links a:hover { color: var(--red); }
  .l-btn-signin {
    padding: 9px 22px; background: var(--red); color: var(--white);
    border: none; border-radius: 8px; font-family: inherit;
    font-size: 14px; font-weight: 600; cursor: pointer;
    text-decoration: none; transition: background 0.15s;
  }
  .l-btn-signin:hover { background: var(--red-dark); }

  /* HERO */
  .l-hero {
    min-height: calc(100vh - 68px);
    display: grid; grid-template-columns: 1fr 1fr;
    align-items: center; padding: 80px 5%; gap: 60px;
  }
  .l-hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--red-light); color: var(--red);
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 6px 14px;
    border-radius: 100px; margin-bottom: 22px;
  }
  .l-hero-eyebrow-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; }
  .l-hero-title {
    font-size: clamp(2.4rem, 4vw, 3.4rem); font-weight: 800;
    line-height: 1.15; letter-spacing: -0.02em;
    color: var(--ink); margin-bottom: 20px;
  }
  .l-hero-title span { color: var(--red); }
  .l-hero-subtitle {
    font-size: 17px; color: var(--ink-light); line-height: 1.7;
    max-width: 480px; margin-bottom: 36px; font-family: 'Roboto', sans-serif;
  }
  .l-hero-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

  /* BUTTONS */
  .l-btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; background: var(--red); color: var(--white);
    border-radius: 10px; font-size: 15px; font-weight: 600;
    text-decoration: none; transition: background 0.15s, transform 0.15s;
  }
  .l-btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); }
  .l-btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 24px; color: var(--ink-mid);
    border: 1.5px solid var(--line); border-radius: 10px;
    font-size: 15px; font-weight: 500; text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .l-btn-ghost:hover { border-color: var(--red); color: var(--red); }

  /* HERO VISUAL */
  .l-hero-visual { position: relative; height: 480px; }
  .l-hero-card-main {
    position: absolute; top: 0; left: 0; right: 60px; bottom: 60px;
    background: linear-gradient(135deg, #921F22 0%, #5a1215 100%);
    border-radius: 20px; padding: 40px;
    display: flex; flex-direction: column; justify-content: space-between;
    overflow: hidden;
  }
  .l-hero-card-main::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 260px; height: 260px; background: rgba(255,255,255,0.06); border-radius: 50%;
  }
  .l-hero-card-main::after {
    content: ''; position: absolute; bottom: -40px; left: -40px;
    width: 180px; height: 180px; background: rgba(255,255,255,0.04); border-radius: 50%;
  }
  .l-hero-card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  .l-hero-card-verse blockquote { font-size: 18px; font-weight: 600; color: #fff; line-height: 1.55; margin-bottom: 10px; font-style: italic; position: relative; z-index: 1; }
  .l-hero-card-verse cite { font-size: 13px; color: rgba(255,255,255,0.6); font-style: normal; position: relative; z-index: 1; }
  .l-hero-card-stats { display: flex; gap: 24px; position: relative; z-index: 1; }
  .l-hero-stat-num { font-size: 24px; font-weight: 800; color: #fff; line-height: 1; }
  .l-hero-stat-lbl { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 4px; }

  .l-hero-card-float {
    position: absolute; right: 0; bottom: 0; width: 220px;
    background: var(--white); border-radius: 16px; padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }
  .l-float-title { font-size: 12px; font-weight: 600; color: var(--ink-light); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .l-float-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .l-float-item:last-child { border-bottom: none; }
  .l-float-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .l-float-dot-red { background: var(--red); }
  .l-float-dot-green { background: #16A34A; }
  .l-float-dot-yellow { background: #D97706; }
  .l-float-item-text { font-size: 13px; font-weight: 500; color: var(--ink-mid); }
  .l-float-item-sub { font-size: 11px; color: var(--ink-light); }

  /* STATS BAR */
  .l-stats-bar {
    background: var(--bg);
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 36px 5%;
    display: grid; grid-template-columns: repeat(4, 1fr);
  }
  .l-stat-item { text-align: center; padding: 0 20px; border-right: 1px solid var(--line); }
  .l-stat-item:last-child { border-right: none; }
  .l-stat-num { font-size: 2rem; font-weight: 800; color: var(--red); line-height: 1; margin-bottom: 6px; }
  .l-stat-lbl { font-size: 13px; color: var(--ink-light); font-family: 'Roboto', sans-serif; }

  /* FEATURES */
  .l-features { padding: 100px 5%; background: var(--white); }
  .l-section-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--red); margin-bottom: 12px; }
  .l-section-title { font-size: clamp(1.8rem, 3vw, 2.4rem); font-weight: 800; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 16px; line-height: 1.2; }
  .l-section-sub { font-size: 16px; color: var(--ink-light); max-width: 520px; line-height: 1.7; font-family: 'Roboto', sans-serif; }
  .l-section-header { margin-bottom: 56px; }
  .l-features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .l-feature-card {
    background: var(--bg); border: 1px solid var(--line); border-radius: 16px; padding: 32px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }
  .l-feature-card:hover { border-color: #e8c4c5; box-shadow: 0 8px 32px rgba(146,31,34,0.08); transform: translateY(-3px); }
  .l-feature-icon { width: 48px; height: 48px; background: var(--red-light); border-radius: 12px; display: grid; place-items: center; margin-bottom: 20px; }
  .l-feature-title { font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }
  .l-feature-text { font-size: 14px; color: var(--ink-light); line-height: 1.65; font-family: 'Roboto', sans-serif; }

  /* MISSION */
  .l-mission { background: var(--bg); padding: 100px 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .l-mission-visual {
    background: linear-gradient(135deg, #921F22 0%, #5a1215 100%);
    border-radius: 20px; padding: 56px 48px; position: relative; overflow: hidden;
  }
  .l-mission-visual::before {
    content: ''; position: absolute; top: -80px; right: -80px;
    width: 300px; height: 300px; background: rgba(255,255,255,0.05); border-radius: 50%;
  }
  .l-mission-quote { position: relative; z-index: 1; font-size: 42px; color: rgba(255,255,255,0.2); line-height: 1; margin-bottom: 16px; font-family: Georgia, serif; }
  .l-mission-text { position: relative; z-index: 1; font-size: 20px; font-weight: 600; color: #fff; line-height: 1.55; font-style: italic; margin-bottom: 20px; }
  .l-mission-ref { position: relative; z-index: 1; font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; }
  .l-mission-pillars { display: flex; flex-direction: column; gap: 20px; margin-top: 36px; position: relative; z-index: 1; }
  .l-mission-pillar { display: flex; align-items: center; gap: 12px; }
  .l-pillar-check { width: 22px; height: 22px; background: rgba(255,255,255,0.15); border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
  .l-pillar-text { font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 500; }
  .l-mission-body { font-size: 15px; color: var(--ink-light); line-height: 1.8; font-family: 'Roboto', sans-serif; margin-bottom: 32px; }
  .l-values-list { display: flex; flex-direction: column; gap: 16px; }
  .l-value-item { display: flex; gap: 14px; align-items: flex-start; }
  .l-value-icon { width: 36px; height: 36px; background: var(--red-light); border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; margin-top: 2px; }
  .l-value-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
  .l-value-desc { font-size: 13px; color: var(--ink-light); font-family: 'Roboto', sans-serif; }

  /* CTA */
  .l-cta { padding: 100px 5%; background: var(--white); text-align: center; }
  .l-cta-inner { max-width: 600px; margin: 0 auto; }
  .l-cta-text { font-size: 16px; color: var(--ink-light); line-height: 1.7; margin-bottom: 36px; font-family: 'Roboto', sans-serif; }
  .l-cta-actions { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }

  /* FOOTER */
  .l-footer { background: var(--ink); padding: 56px 5% 32px; }
  .l-footer-top {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 48px;
    padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 32px;
  }
  .l-footer-brand-icon { width: 40px; height: 40px; background: var(--red); border-radius: 10px; display: grid; place-items: center; margin-bottom: 16px; }
  .l-footer-brand-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .l-footer-brand-desc { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.65; font-family: 'Roboto', sans-serif; max-width: 260px; }
  .l-footer-col-title { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
  .l-footer-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .l-footer-links a { font-size: 14px; color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.15s; font-family: 'Roboto', sans-serif; }
  .l-footer-links a:hover { color: #fff; }
  .l-footer-bottom { display: flex; align-items: center; justify-content: space-between; }
  .l-footer-copy { font-size: 13px; color: rgba(255,255,255,0.3); font-family: 'Roboto', sans-serif; }
  .l-footer-copy a { color: rgba(255,255,255,0.45); text-decoration: none; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .l-hero { grid-template-columns: 1fr; min-height: auto; padding: 60px 5%; }
    .l-hero-visual { display: none; }
    .l-features-grid { grid-template-columns: 1fr 1fr; }
    .l-mission { grid-template-columns: 1fr; }
    .l-mission-visual { display: none; }
    .l-stats-bar { grid-template-columns: repeat(2, 1fr); }
    .l-stat-item:nth-child(2) { border-right: none; }
    .l-stat-item:nth-child(3) { border-top: 1px solid var(--line); }
    .l-stat-item:nth-child(4) { border-top: 1px solid var(--line); border-right: none; }
    .l-footer-top { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .l-nav-links { display: none; }
    .l-features-grid { grid-template-columns: 1fr; }
    .l-footer-top { grid-template-columns: 1fr; }
    .l-footer-bottom { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
