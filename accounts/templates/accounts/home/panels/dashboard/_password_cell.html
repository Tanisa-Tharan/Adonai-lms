{% if password %}
  <span data-password-container="1">
    <span data-password-value="1" data-password="{{ password }}" data-hidden="1">********</span>
    <button type="button" class="button button-secondary" data-password-toggle="1" style="margin-left:10px;">Show</button>
  </span>
{% else %}
  <span class="mini-meta">-</span>
{% endif %}
