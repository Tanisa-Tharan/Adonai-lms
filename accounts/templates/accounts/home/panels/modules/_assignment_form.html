{% load template_extras %}

<div class="panel-card" style="margin-top: 12px;">
  <form
    method="post"
    enctype="multipart/form-data"
    hx-post="{% if editing_assignment %}{% url 'update_module_assignment' module_run.id editing_assignment.id %}?from_faculty_assignments=true{% else %}{% url 'add_module_assignment' module_run.id %}?from_faculty_assignments=true{% endif %}"
    {% if from_faculty_assignments %}
    hx-target="#assignments-panel"
    hx-swap="outerHTML"
    hx-encoding="multipart/form-data"
    hx-on::before-request="showAssignmentLoadingSpinner()"
    hx-on::after-request="hideAssignmentLoadingSpinner()"
    {% else %}
    hx-target="closest [id$='detail-drawer']"
    hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
    hx-on::before-request="showAssignmentLoadingSpinner(); sessionStorage.setItem('activeModuleTab', 'assignments-tab');"
    hx-on::after-request="hideAssignmentLoadingSpinner(); sessionStorage.setItem('activeModuleTab', 'assignments-tab');"
    {% endif %}
  >
    {% csrf_token %}

    <div class="user-form-grid" style="grid-template-columns: 1fr;">
      <section class="user-form-section">
        <h4>{% if editing_assignment %}Edit Assignment{% else %}New Assignment{% endif %}</h4>

        <!-- Row 1: Title (full width) -->
        <div class="form-row-single">
          <div class="field-group">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" required placeholder="e.g. Assignment 1" value="{% if editing_assignment %}{{ editing_assignment.title }}{% endif %}">
          </div>
        </div>

        <!-- Row 2: Description (full width) with Rich Text Editor -->
        <div class="form-row-single">
          <div class="field-group">
            <label for="description">Description</label>
            <div id="quill-editor-container" style="height: 250px; background: white; border: 1px solid #D1D5DB; border-radius: 6px;"></div>
            <textarea name="description" id="description" style="display: none;">{% if editing_assignment %}{{ editing_assignment.description }}{% endif %}</textarea>
          </div>
        </div>

        <!-- Row 3: Files (full width) -->
        <div class="form-row-single">
          <div class="field-group">
            <label for="files">Files (optional){% if editing_assignment %} - add more{% endif %}</label>
            <input type="file" name="files" id="files" multiple>
          </div>
        </div>

        <!-- Row 4: Due Date and Max Score (half width each) -->
        <div class="form-row-half">
          <div class="field-group">
            <label for="due_date">Due Date</label>
            <input type="date" name="due_date" id="due_date" required value="{% if editing_assignment %}{{ editing_assignment.due_date|date:'Y-m-d' }}{% endif %}">
          </div>
          <div class="field-group">
            <label for="max_score">Max Score</label>
            <input type="number" name="max_score" id="max_score" required min="0" step="1" value="{% if editing_assignment %}{{ editing_assignment.max_score }}{% else %}100{% endif %}">
          </div>
        </div>
      </section>
    </div>

    <div class="form-actions" style="margin-top: 10px;">
      {% if from_faculty_assignments %}
      <button
        type="button"
        class="button button-secondary"
        onclick="document.getElementById('assignments-detail-view').style.display='none'; document.getElementById('assignments-detail-view').innerHTML=''; document.getElementById('assignments-module-selection').style.display='block';"
      >
        Cancel
      </button>
      {% else %}
      <button
        type="button"
        class="button button-secondary"
        hx-get="{% url 'module_assignments_detail' module_run.id %}"
        hx-target="closest [id$='detail-drawer']"
        hx-swap="innerHTML"
        hx-on::before-request="sessionStorage.setItem('activeModuleTab', 'assignments-tab');"
      >
        Cancel
      </button>
      {% endif %}
      <button type="submit" class="button button-primary">{% if editing_assignment %}Update Assignment{% else %}Create Assignment{% endif %}</button>
    </div>
  </form>
  
  <!-- Loading Overlay -->
  <div id="assignment-form-loading-overlay" class="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 9999; align-items: center; justify-content: center;">
    <div style="text-align: center;">
      <div class="spinner" style="width: 50px; height: 50px; border: 4px solid #E7E5E4; border-top-color: #921F22; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;"></div>
      <p style="color: #78716C; font-size: 14px; font-weight: 500;">{% if editing_assignment %}Updating assignment...{% else %}Creating assignment...{% endif %}</p>
    </div>
  </div>
  
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  
  <script>
    function showAssignmentLoadingSpinner() {
      const overlay = document.getElementById('assignment-form-loading-overlay');
      if (overlay) {
        overlay.style.display = 'flex';
      }
    }
    
    function hideAssignmentLoadingSpinner() {
      const overlay = document.getElementById('assignment-form-loading-overlay');
      if (overlay) {
        overlay.style.display = 'none';
      }
    }
  </script>
</div>
