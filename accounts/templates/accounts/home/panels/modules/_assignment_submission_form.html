<div class="panel-card" id="submission-form-{{ assignment.id }}" style="display: none; margin-top: 12px;">
  <form
    method="post"
    enctype="multipart/form-data"
    id="assignment-submission-form-{{ assignment.id }}"
    onsubmit="return handleSubmissionSubmit(event, '{{ assignment.id }}', '{{ module_run.id }}', 'submitted')"
  >
    {% csrf_token %}
    
    <div class="user-form-grid" style="grid-template-columns: 1fr;">
      <section class="user-form-section">
        <div class="submission-form-header">
          <h4>Submit Assignment</h4>
          <button
            type="button"
            onclick="hideSubmissionForm('{{ assignment.id }}')"
            class="btn-close"
            title="Close"
          >
            ×
          </button>
        </div>

        <!-- Row 1: Title (readonly) -->
        <div class="form-row-single">
          <div class="field-group">
            <label>Title</label>
            <input
              type="text"
              value="{{ assignment.title }}"
              readonly
              class="form-input-readonly"
            />
          </div>
        </div>

        <!-- Row 2: Due Date (readonly) -->
        <div class="form-row-single">
          <div class="field-group">
            <label>Due Date</label>
            <input
              type="text"
              value="{{ assignment.due_date|date:'Y-m-d' }}"
              readonly
              class="form-input-readonly"
            />
          </div>
        </div>

        {% if user.role == 'ADMIN' %}
        <!-- Row 3: Student Selection (for admin) -->
        <div class="form-row-single">
          <div class="field-group">
            <label for="student-module-select-{{ assignment.id }}">Submit as Student <span style="color: #DC2626;">*</span></label>
            <select
              name="student_module_id"
              id="student-module-select-{{ assignment.id }}"
              required
            >
              <option value="">Select a student...</option>
              {% for student_mod in module_run.student_modules.all %}
              <option value="{{ student_mod.id }}">
                {{ student_mod.enrollment.student.first_name }} {{ student_mod.enrollment.student.last_name }}
                ({{ student_mod.enrollment.student.email }})
              </option>
              {% endfor %}
            </select>
          </div>
        </div>
        {% endif %}

        <!-- Row 4: Your Answer (Rich Text Editor) -->
        <div class="form-row-single" style="clear: both; margin-bottom: 20px;">
          <div class="field-group">
            <label>Your Answer <span style="color: #DC2626;">*</span></label>
            <div id="quill-submission-editor-{{ assignment.id }}" style="position: relative; background: white; min-height: 200px; max-height: 400px; border: 1px solid #D1D5DB; border-radius: 6px; overflow-y: auto;"></div>
            <textarea
              name="description"
              id="submission-description-{{ assignment.id }}"
              style="display: none;"
              required
            ></textarea>
          </div>
        </div>

        <!-- Row 5: File Upload (Optional) -->
        <div class="form-row-single" style="clear: both; margin-top: 40px;">
          <div class="field-group">
            <label for="submission-file-{{ assignment.id }}" style="display: block; margin-bottom: 8px;">Attach File (Optional)</label>
            <input
              type="file"
              name="file"
              id="submission-file-{{ assignment.id }}"
              accept=".pdf,.doc,.docx,.txt,.jpg,.jpeg,.png,.zip"
              style="display: block; padding: 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-family: Lexend, sans-serif; font-size: 14px; background: white; cursor: pointer; width: 100%; box-sizing: border-box;"
            />
            <span style="display: block; color: #6B7280; font-size: 12px; font-family: Lexend, sans-serif; margin-top: 6px;">
              Accepted formats: PDF, DOC, DOCX, TXT, JPG, PNG, ZIP (Max 10MB)
            </span>
          </div>
        </div>

        <!-- Action Buttons -->
        <div style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid #E2E8F0; width: 100%;">
      <!-- Save Draft button -->
          <button
            type="button"
            id="save-draft-btn-{{ assignment.id }}"
            onclick="handleSaveDraft(event, '{{ assignment.id }}', '{{ module_run.id }}')"
            style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #FFF; border: 1px solid #921F22; border-radius: 6px; color: #921F22; font-family: Lexend, sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;"
            onmouseover="this.style.backgroundColor='#FFF5F5';"
            onmouseout="this.style.backgroundColor='#FFF';"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none" class="btn-icon">
              <path d="M18 4V16C18 16.55 17.8042 17.0208 17.4125 17.4125C17.0208 17.8042 16.55 18 16 18H2C1.45 18 0.979167 17.8042 0.5875 17.4125C0.195833 17.0208 0 16.55 0 16V2C0 1.45 0.195833 0.979167 0.5875 0.5875C0.979167 0.195833 1.45 0 2 0H14L18 4ZM16 4.85L13.15 2H2V16H16V4.85ZM9 15C9.83333 15 10.5417 14.7083 11.125 14.125C11.7083 13.5417 12 12.8333 12 12C12 11.1667 11.7083 10.4583 11.125 9.875C10.5417 9.29167 9.83333 9 9 9C8.16667 9 7.45833 9.29167 6.875 9.875C6.29167 10.4583 6 11.1667 6 12C6 12.8333 6.29167 13.5417 6.875 14.125C7.45833 14.7083 8.16667 15 9 15ZM3 7H12V3H3V7ZM2 4.85V16V2V4.85Z" fill="#921F22"/>
            </svg>
            <div class="btn-spinner" style="display: none; width: 16px; height: 16px; border: 2px solid #921F22; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite;"></div>
            <span class="btn-text">Save Draft</span>
          </button>

          <!-- Submit button -->
          <button
            type="submit"
            id="submit-btn-form-{{ assignment.id }}"
            style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #921F22; border: none; border-radius: 6px; color: #FFF; font-family: Lexend, sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;"
            onmouseover="this.style.backgroundColor='#7A1A1C';"
            onmouseout="this.style.backgroundColor='#921F22';"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" class="btn-icon">
              <path d="M7 16V7.85L4.4 10.45L3 9L8 4L13 9L11.6 10.45L9 7.85V16H7ZM0 5V2C0 1.45 0.195833 0.979167 0.5875 0.5875C0.979167 0.195833 1.45 0 2 0H14C14.55 0 15.0208 0.195833 15.4125 0.5875C15.8042 0.979167 16 1.45 16 2V5H14V2H2V5H0Z" fill="white"/>
            </svg>
            <div class="btn-spinner" style="display: none; width: 16px; height: 16px; border: 2px solid #FFF; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite;"></div>
            <span class="btn-text">Submit</span>
          </button>
        </div>
      </section>
    </div>
  </form>
</div>
