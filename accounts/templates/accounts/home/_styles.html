<style>
  :root {
    --bg: #f4f7fb;
    --panel: #ffffff;
    --panel-soft: #eef3f9;
    --line: #d7e0ea;
    --text: #1f2937;
    --muted: #64748b;
    --primary: #0f766e;
    --primary-dark: #115e59;
    --danger: #b91c1c;
    --shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Plus Jakarta Sans", sans-serif;
    background:
      radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
      linear-gradient(180deg, #f9fbfd 0%, var(--bg) 100%);
    color: var(--text);
  }

  .layout {
    min-height: 100vh;
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 300px 1fr;
  }

  @media (max-width: 1200px) {
    .layout {
      grid-template-columns: 260px 1fr;
    }
  }

  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
    }
  }

  .sidebar {
    display: flex;
    width: 100%;
    min-height: 100vh;
    padding: 16px;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    border-right: 1px solid #E7E5E4;
    background: #FFF;
    box-sizing: border-box;
  }

  @media (max-width: 900px) {
    .sidebar {
      min-height: auto;
      border-right: none;
      border-bottom: 1px solid #E7E5E4;
    }
  }

  .sidebar-main {
    display: grid;
    gap: 28px;
  }

  .brand {
    margin-bottom: 32px;
  }

  .brand h1 {
    margin: 0 0 8px;
    font-size: 30px;
    line-height: 28px;
    letter-spacing: -1px;
  }

  .brand-name {
    color: #000;
    font-family: Lexend, sans-serif;
    font-size: 30px;
    font-style: normal;
    font-weight: 400;
    line-height: 28px;
    letter-spacing: -1px;
  }

  .brand-school {
    color: #921F22;
    font-family: "BackBone Melavita";
    font-size: 30px;
    font-style: italic;
    font-weight: 400;
    line-height: 28px;
    letter-spacing: -1px;
  }

  .brand-portal {
    display: flex;
    width: 136.98px;
    height: 20px;
    flex-direction: column;
    justify-content: center;
    margin: 0;
    color: #78716C;
    font-family: Lexend, sans-serif;
    font-size: 10px;
    font-style: normal;
    font-weight: 400;
    line-height: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  @media (max-width: 900px) {
    .brand h1 {
      font-size: 24px;
      line-height: 24px;
    }

    .brand-name,
    .brand-school {
      font-size: 24px;
      line-height: 24px;
    }

    .brand-portal {
      font-size: 9px;
      width: auto;
    }
  }

  .nav {
    align-self: stretch;
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
  }

  .nav button {
    align-self: stretch;
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 16px;
    border: 0;
    border-radius: 8px;
    background: transparent !important;
    color: #57534e !important;
    text-align: left;
    font-family: Roboto, sans-serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 20px;
    cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
  }

  .nav button:hover,
  .nav button.active {
    transform: translateX(0);
  }

  .nav button.active {
    background: rgba(113, 2, 14, 0.06) !important;
    color: #921f22 !important;
  }

  .nav button.active svg path {
    fill: #921f22 !important;
  }

  .nav button:not(.active) svg path {
    fill: #57534e !important;
  }

  .nav button:not(.active):hover {
    background: rgba(113, 2, 14, 0.04) !important;
  }

  .tab-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: 22px;
    height: 18px;
  }

  .tab-icon svg {
    width: 100%;
    height: 100%;
    max-width: 22px;
    max-height: 18px;
  }

  /* Responsive navigation buttons */
  @media (max-width: 1200px) {
    .nav button {
      padding: 10px 14px;
      font-size: 15px;
      gap: 10px;
    }

    .tab-icon {
      width: 20px;
      height: 16px;
    }

    .tab-icon svg {
      max-width: 20px;
      max-height: 16px;
    }
  }

  @media (max-width: 900px) {
    .nav {
      gap: 2px;
    }

    .nav button {
      padding: 10px 12px;
      font-size: 14px;
      gap: 10px;
      border-radius: 6px;
    }

    .tab-icon {
      width: 18px;
      height: 16px;
    }

    .tab-icon svg {
      max-width: 18px;
      max-height: 16px;
    }

    .sidebar-footer {
      width: auto !important;
      display: flex;
      justify-content: flex-start;
    }

    .logout-form {
      width: auto !important;
    }

    .sidebar-footer .logout-form button {
      width: auto !important;
      padding: 10px 16px;
      font-size: 14px;
      gap: 10px;
    }
  }

  @media (max-width: 600px) {
    .nav button {
      padding: 8px 10px;
      font-size: 13px;
      gap: 8px;
    }

    .tab-icon {
      width: 16px;
      height: 14px;
    }

    .tab-icon svg {
      max-width: 16px;
      max-height: 14px;
    }

    .sidebar-footer .logout-form button {
      padding: 10px 12px;
      font-size: 14px;
      gap: 10px;
    }
  }

  .content {
    width: 100%;
    max-width: 100%;
    padding: 28px;
  }

  .shell {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
  }

  /* .shell {
    background: rgba(255, 255, 255, 0.74);
    border: 1px solid rgba(255, 255, 255, 0.8);
    border-radius: 28px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    padding: 28px;
  } */

  .htmx-indicator {
    position: fixed;
    top: 18px;
    right: 18px;
    width: 44px;
    height: 44px;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(15, 23, 42, 0.12);
    border-radius: 999px;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    z-index: 9999;
  }

  .htmx-indicator.htmx-request {
    display: flex;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border-radius: 999px;
    border: 2px solid rgba(15, 118, 110, 0.24);
    border-top-color: rgba(15, 118, 110, 0.95);
    animation: spin 700ms linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .topbar h2 {
    margin: 0;
    font-size: 34px;
  }

  .topbar p {
    margin: 6px 0 0;
    color: var(--muted);
  }

  .logout-form {
    margin: 0;
    width: 100%;
  }

  .sidebar-footer {
    width: 100%;
  }

  .sidebar-footer .logout-form button {
    width: 100%;
    align-self: stretch;
    display: flex;
    padding: 12px 16px;
    align-items: center;
    gap: 12px;
    border-radius: 8px;
    background: #921F22;
    color: #FFF;
    border: 0;
    font-family: Roboto, sans-serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 20px;
    text-align: left;
    cursor: pointer;
    transition: background 0.18s ease;
  }

  .sidebar-footer .logout-form button:hover {
    background: #7a1a1c;
  }

  .sidebar-footer .logout-form button svg path {
    fill: #FFF;
  }

  /* .sidebar-footer .logout-form button:hover {
    background: rgba(255, 255, 255, 0.14);
  } */

  .button,
  .logout-form button,
  .table-actions button {
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .button-primary,
  .logout-form button,
  .table-actions .button-accent {
    background: var(--primary);
    color: #fff;
  }

  .button-secondary {
    background: var(--panel-soft);
    color: var(--text);
    border: 1px solid var(--line);
  }

  /* Form action buttons - Figma styling */
  .form-actions .button-primary {
    display: flex;
    padding: 12px 40px;
    align-items: center;
    gap: 8px;
    border-radius: 4px;
    background: #921F22;
    color: #FFF;
    font-family: Lexend, sans-serif;
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
  }

  .form-actions .button-primary:hover {
    background: #7a1a1c;
  }

  .form-actions .button-secondary {
    display: flex;
    padding: 12px 24px;
    justify-content: center;
    align-items: center;
    border-radius: 4px;
    border: 1px solid #71020E;
    background: transparent;
    color: #71020E;
    font-family: Lexend, sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
  }

  .form-actions .button-secondary:hover {
    background: rgba(113, 2, 14, 0.05);
  }

  /* Panel action buttons - Figma styling */
  .panel-actions .button.button-primary {
    display: flex !important;
    padding: 8px 24px !important;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 2px !important;
    background: #921F22 !important;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    color: #FFF !important;
    font-family: Lexend, sans-serif;
    font-size: 14px !important;
    font-weight: 500;
    border: none !important;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
  }

  .panel-actions .button.button-primary:hover {
    background: #7a1a1c !important;
  }

  .panel-actions .button.button-secondary {
    display: flex !important;
    padding: 12px 24px !important;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 4px !important;
    border: 1px solid #71020E !important;
    background: transparent !important;
    color: #71020E !important;
    font-family: Lexend, sans-serif;
    font-size: 14px !important;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
  }

  .panel-actions .button.button-secondary:hover {
    background: rgba(113, 2, 14, 0.05) !important;
  }

  /* Responsive adjustments for panel action buttons */
  @media (max-width: 768px) {
    .panel-actions .button-primary,
    .panel-actions .button-secondary {
      padding: 8px 16px;
      font-size: 13px;
    }
  }

  @media (max-width: 480px) {
    .panel-actions .button-primary,
    .panel-actions .button-secondary {
      padding: 6px 12px;
      font-size: 12px;
    }
  }

  .button-danger {
    background: #fee2e2;
    color: var(--danger);
  }

  .button-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
  }

  .tab-panel {
    display: none;
  }

  .tab-panel.active {
    display: block;
    animation: fadeIn 0.24s ease;
    background: transparent;
  }

  .hero-card,
  .panel-card {
    /* background: var(--panel);
    border: 1px solid var(--line); */
    border-radius: 22px;
    /* padding: 22px; */
    margin-bottom: 22px;
  }

  /* .hero-card {
    background: linear-gradient(135deg, #f2fbfa 0%, #ffffff 100%);
  } */

  .welcome-banner {
    display: flex;
    width: 100%;
    min-height: 150px;
    padding: 32px;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    border-radius: 16px;
    background-color: #921F22;
    background-position: center center;
    background-repeat: no-repeat;
    background-size: cover;
    margin-bottom: 22px;
  }

  .welcome-banner h3 {
    margin: 0 0 8px;
    color: #FFF;
    font-family: Roboto;
    font-size: 48px;
    font-style: normal;
    font-weight: 400;
    line-height: 56px;
    letter-spacing: -0.96px;
  }

  .welcome-banner p {
    margin: 0;
    color: #FFF;
    font-family: Roboto;
    font-size: 16px;
    font-style: normal;
    font-weight: 400;
    line-height: 24px;
  }

  .banner-action-button {
    display: flex;
    padding: 12px 16px;
    justify-content: center;
    align-items: center;
    gap: 2px;
    border-radius: 8px;
    background: #FFF;
    color: #921F22;
    text-align: center;
    font-family: Roboto;
    font-size: 14px;
    font-style: normal;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    white-space: nowrap;
  }

  .banner-action-button:hover {
    background: #F5F5F5;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 20px;
    width: 100%;
  }

  @media (max-width: 1024px) {
    .stats {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 640px) {
    .stats {
      grid-template-columns: 1fr;
    }
  }

  .stat {
    width: 100%;
    min-height: 140px;
    position: relative;
    border: 1px solid #E0DDD5;
    background: rgba(255, 255, 255, 0.80);
    border-radius: 12px;
    box-shadow: 0 10px 40px -10px rgba(113, 2, 14, 0.06);
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
  }

  .stat span {
    display: block;
    align-self: stretch;
    color: #78716C;
    font-family: Roboto;
    font-size: 14px;
    font-style: normal;
    font-weight: 400;
    line-height: 20px;
    letter-spacing: 0.28px;
  }

  .stat strong {
    display: block;
    align-self: stretch;
    color: #1C1917;
    font-family: Lexend;
    font-size: 24px;
    font-style: normal;
    font-weight: 400;
    line-height: 32px;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-top: 18px;
    margin-bottom: 18px;
  }

  .panel-header h3 {
    display: flex;
    /* width: 118.17px; */
    flex-direction: column;
    justify-content: center;
    margin: 0;
    color: #1C1917;
    font-family: Lexend;
    font-size: 16px;
    font-style: normal;
    font-weight: 700;
    line-height: 24px;
  }

  .panel-header p {
    margin: 4px 0 0;
    color: var(--muted);
  }

  .panel-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 12px;
    border: 1px solid #E0DDD5;
    background: #FFF;
    box-shadow: 0 10px 40px -10px rgba(113, 2, 14, 0.06);
    overflow: visible;
  }

  thead {
    background: #FFF;
  }

  th,
  td {
    padding: 14px 12px;
    border-bottom: 1px solid #E0DDD5;
    vertical-align: middle;
    text-align: left;
  }

  th {
    color: #78716C;
    font-family: Lexend;
    font-size: 12px;
    font-style: normal;
    font-weight: 600;
    line-height: 16px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  td {
    color: #57534E;
    font-family: Lexend;
    font-size: 14px;
    font-style: normal;
    font-weight: 400;
  }

  .table-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .role-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 110px;
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    border: 1px solid transparent;
  }

  .role-pill.student {
    color: #ff8a34;
    background: #fff4e8;
  }

  .role-pill.faculty {
    color: #4a97e8;
    background: #e9f4ff;
  }

  .role-pill.supervisor {
    color: #42b86f;
    background: #e8f9ec;
  }

  .role-pill.admin {
    color: #7c3aed;
    background: #f3e8ff;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 92px;
    padding: 10px 16px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
  }

  .status-pill.active {
    color: #42b86f;
    background: #e8f9ec;
  }

  .status-pill.inactive {
    color: #ef4444;
    background: #fee2e2;
  }

  .actions-cell {
    position: relative;
    width: 88px;
  }

  .action-menu-button {
    width: 42px;
    height: 42px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    color: #8ba0c5;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
  }

  .action-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    min-width: 180px;
    padding: 8px;
    border: 1px solid #E0DDD5;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 16px 30px rgba(15, 23, 42, 0.2);
    display: none;
    z-index: 1000;
  }

  .action-menu.open {
    display: block;
  }

  .action-menu a,
  .action-menu button {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 10px 12px;
    border: none;
    background: transparent;
    color: var(--text);
    border-radius: 10px;
    text-decoration: none;
    cursor: pointer;
    font-size: 14px;
  }

  .action-menu a:hover,
  .action-menu button:hover {
    background: #f8fafc;
  }

  .action-menu .danger-item {
    color: var(--danger);
  }

  .quarter-row {
    display: none;
    background: #fbfdff;
  }

  .quarter-row.visible {
    display: table-row;
  }

  .quarter-wrapper {
    padding: 12px 0 4px;
  }

  .quarter-title {
    margin: 0 0 12px;
    font-size: 16px;
  }

  .placeholder {
    color: var(--muted);
    border: 1px dashed var(--line);
    border-radius: 18px;
    padding: 28px;
    background: rgba(255, 255, 255, 0.8);
  }

  .user-form-shell {
    display: flex;
    width: 100%;
    padding: 32px;
    flex-direction: column;
    align-items: stretch;
    gap: 24px;
    border: none;
    background: #F8F9FA;
    box-sizing: border-box;
  }

  @media (max-width: 768px) {
    .user-form-shell {
      padding: 24px 16px;
      gap: 20px;
    }
  }

  .user-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
    width: 100%;
  }

  .user-form-section {
    display: flex;
    width: 100%;
    padding: 16px 32px 32px 32px;
    flex-direction: column;
    align-items: flex-start;
    border-radius: 4px;
    border: 1px solid #E5E7EB;
    background: #FFF;
    box-sizing: border-box;
  }

  @media (max-width: 960px) {
    .user-form-section {
      padding: 16px 24px 24px 24px;
    }
  }

  @media (max-width: 640px) {
    .user-form-section {
      padding: 16px 16px 24px 16px;
    }
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 14px;
    width: 100%;
  }

  .form-row-single {
    display: grid;
    grid-template-columns: 1fr;
    margin-bottom: 14px;
    width: 100%;
  }

  .form-row-half {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 14px;
    width: 100%;
  }

  .form-row-half .field-group:only-child {
    grid-column: 1;
  }

  @media (max-width: 768px) {
    .form-row,
    .form-row-half {
      grid-template-columns: 1fr;
    }
  }

  .user-form-section h4 {
    margin: 0 0 14px;
    color: #71020E;
    font-family: Lexend;
    font-size: 24px;
    font-style: normal;
    font-weight: 600;
    line-height: 31.2px; /* 130% */
  }

  .field-group {
    margin-bottom: 14px;
  }

  .field-group label {
    display: block;
    margin-bottom: 6px;
    color: #58413F;
    font-family: Lexend, sans-serif;
    font-size: 14px;
    font-style: normal;
    font-weight: 500;
    line-height: 19.6px;
    letter-spacing: 0.14px;
  }

  .locked-role {
    display: inline-flex;
    align-items: center;
    min-width: 140px;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #f8fbff;
  }
