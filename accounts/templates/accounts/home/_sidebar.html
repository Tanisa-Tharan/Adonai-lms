<aside class="sidebar">
  <div class="sidebar-main">
    <div class="brand">
      <h1>
        <span class="brand-name">Adonai </span><span class="brand-school">Bible School</span>
      </h1>
      <p class="brand-portal">
        {% if request.user.role == 'ADMIN' %}
          ADMIN PORTAL
        {% elif request.user.role == 'FACULTY' %}
          FACULTY PORTAL
        {% elif request.user.role == 'STUDENT' %}
          STUDENT PORTAL
        {% elif request.user.role == 'SUPERVISOR' %}
          SUPERVISOR PORTAL
        {% endif %}
      </p>
    </div>
