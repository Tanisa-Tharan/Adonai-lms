<script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
<!-- Quill.js Rich Text Editor -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
  // Initialize Quill editor for assignment description
  let quillInstance = null;
  
  function initQuillEditor() {
    const editorContainer = document.getElementById('quill-editor-container');
    const hiddenTextarea = document.getElementById('description');
    
    if (!editorContainer || !hiddenTextarea) {
      return;
    }

    // Remove existing instance if any
    if (quillInstance) {
      quillInstance = null;
      editorContainer.innerHTML = '';
    }

    // Initialize Quill
    quillInstance = new Quill(editorContainer, {
      theme: 'snow',
      placeholder: 'Enter assignment description with formatting...',
      modules: {
        toolbar: [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          [{ 'indent': '-1'}, { 'indent': '+1' }],
          [{ 'align': [] }],
          [{ 'color': [] }, { 'background': [] }],
          ['link'],
          ['clean']
        ]
      }
    });

    // Set initial content if editing
    const initialContent = hiddenTextarea.value;
    if (initialContent) {
      quillInstance.root.innerHTML = initialContent;
    }

    // Sync content to hidden textarea on change
    quillInstance.on('text-change', function() {
      hiddenTextarea.value = quillInstance.root.innerHTML;
    });

    // Also sync before form submission
    const form = editorContainer.closest('form');
    if (form) {
      form.addEventListener('submit', function() {
        hiddenTextarea.value = quillInstance.root.innerHTML;
      });
    }
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(initQuillEditor, 100);
  });

  // Re-initialize after HTMX content swap
  document.body.addEventListener('htmx:afterSwap', function(event) {
    setTimeout(initQuillEditor, 100);
  });
</script>
<script>
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(";").shift();
    return null;
  }

  document.addEventListener("htmx:configRequest", (event) => {
    const token = getCookie("csrftoken");
    if (token) {
      event.detail.headers["X-CSRFToken"] = token;
    }
  });

  function confirmDelete(type) {
    return confirm("Are you sure you want to delete this " + type + "? This action cannot be undone.");
  }

  const tabButtons = document.querySelectorAll(".tab-link");
  const tabPanels = document.querySelectorAll(".tab-panel");
  const initialActiveTab = document.body.dataset.activeTab || "dashboard";

  tabButtons.forEach((button) => {
    button.addEventListener("click", () => {
      const target = button.dataset.tab + "-panel";

      tabButtons.forEach((item) => item.classList.remove("active"));
      tabPanels.forEach((panel) => panel.classList.remove("active"));

      button.classList.add("active");
      document.getElementById(target).classList.add("active");
      if (window.history.replaceState) {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("tab", button.dataset.tab);
        if (button.dataset.tab !== "faculty" && button.dataset.tab !== "students") {
          nextUrl.searchParams.delete("mode");
          nextUrl.searchParams.delete("role");
          nextUrl.searchParams.delete("user_id");
        }
        window.history.replaceState({}, "", nextUrl);
      }
    });
  });

  tabButtons.forEach((item) => item.classList.remove("active"));
  tabPanels.forEach((panel) => panel.classList.remove("active"));
  const initialButton = document.querySelector(`.tab-link[data-tab="${initialActiveTab}"]`);
  const initialPanel = document.getElementById(`${initialActiveTab}-panel`);
  if (initialButton && initialPanel) {
    initialButton.classList.add("active");
    initialPanel.classList.add("active");
  }

  document.addEventListener("click", (event) => {
    const quartersButton = event.target.closest(".toggle-quarters");
    if (quartersButton) {
      const target = document.getElementById(quartersButton.dataset.target);
      const isVisible = target.classList.toggle("visible");
      quartersButton.textContent = isVisible ? "Hide Quarters" : "Show Quarters";
      return;
    }

    const actionButton = event.target.closest(".action-menu-button");
    if (actionButton) {
      event.stopPropagation();
      const menu = actionButton.nextElementSibling;
      const isOpen = menu.classList.contains("open");
      document.querySelectorAll(".action-menu").forEach((item) => item.classList.remove("open"));
      if (!isOpen) {
        menu.classList.add("open");
      }
      return;
    }

    document.querySelectorAll(".action-menu").forEach((menu) => menu.classList.remove("open"));
  });

  // Module tabs functionality
  document.addEventListener("click", (event) => {
    const tabButton = event.target.closest(".module-tab-button");
    if (tabButton) {
      const targetTab = tabButton.dataset.tab;
      
      // Remove active class from all buttons and contents
      document.querySelectorAll(".module-tab-button").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll(".module-tab-content").forEach(content => content.classList.remove("active"));
      
      // Add active class to clicked button and corresponding content
      tabButton.classList.add("active");
      const targetContent = document.getElementById(targetTab);
      if (targetContent) {
        targetContent.classList.add("active");
      }
      
      // Toggle between Add Assignment and Publish buttons based on active tab
      const addAssignmentBtn = document.getElementById('add-assignment-btn');
      const publishBtn = document.getElementById('publish-materials-btn');
      
      if (addAssignmentBtn && publishBtn) {
        if (targetTab === 'readings-tab') {
          // Show Publish button, hide Add Assignment button
          addAssignmentBtn.style.display = 'none';
          publishBtn.style.display = 'flex';
        } else {
          // Show Add Assignment button, hide Publish button
          addAssignmentBtn.style.display = 'flex';
          publishBtn.style.display = 'none';
        }
      }
      
      return;
    }

    const toggle = event.target.closest("[data-password-toggle]");
    if (!toggle) return;
    const container = toggle.closest("[data-password-container]") || toggle.parentElement;
    if (!container) return;
    const valueEl = container.querySelector("[data-password-value]");
    if (!valueEl) return;
    const isHidden = valueEl.dataset.hidden === "1";
    if (isHidden) {
      valueEl.textContent = valueEl.dataset.password;
      valueEl.dataset.hidden = "0";
      toggle.textContent = "Hide";
    } else {
      valueEl.textContent = "********";
      valueEl.dataset.hidden = "1";
      toggle.textContent = "Show";
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".message").forEach((el) => {
      const text = el.textContent || "";
      const marker = "Password:";
      const idx = text.indexOf(marker);
      if (idx === -1) return;
      const password = text.slice(idx + marker.length).trim();
      if (!password) return;
      const prefix = text.slice(0, idx + marker.length).trim();
      el.innerHTML = "";
      const span = document.createElement("span");
      span.textContent = prefix + " ";
      const value = document.createElement("span");
      value.setAttribute("data-password-value", "1");
      value.dataset.password = password;
      value.dataset.hidden = "1";
      value.textContent = "********";
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "button button-secondary";
      btn.style.marginLeft = "10px";
      btn.setAttribute("data-password-toggle", "1");
      btn.textContent = "Show";
      el.appendChild(span);
      el.appendChild(value);
      el.appendChild(btn);
    });
  });
</script>
