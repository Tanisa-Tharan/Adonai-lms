<script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
<!-- Quill.js Rich Text Editor -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
  // Initialize Quill editor for assignment description
  let quillInstance = null;
  
  function initQuillEditor() {
    const editorContainer = document.getElementById('quill-editor-container');
    const hiddenTextarea = document.getElementById('description');
    
    if (!editorContainer || !hiddenTextarea) {
      return;
    }

    // Remove existing instance if any
    if (quillInstance) {
      quillInstance = null;
      editorContainer.innerHTML = '';
    }

    // Initialize Quill
    quillInstance = new Quill(editorContainer, {
      theme: 'snow',
      placeholder: 'Enter assignment description with formatting...',
      modules: {
        toolbar: [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline', 'strike'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          [{ 'indent': '-1'}, { 'indent': '+1' }],
          [{ 'align': [] }],
          [{ 'color': [] }, { 'background': [] }],
          ['link'],
          ['clean']
        ]
      }
    });

    // Set initial content if editing
    const initialContent = hiddenTextarea.value;
    if (initialContent) {
      quillInstance.root.innerHTML = initialContent;
    }

    // Sync content to hidden textarea on change
    quillInstance.on('text-change', function() {
      hiddenTextarea.value = quillInstance.root.innerHTML;
    });

    // Also sync before form submission
    const form = editorContainer.closest('form');
    if (form) {
      form.addEventListener('submit', function() {
        hiddenTextarea.value = quillInstance.root.innerHTML;
      });
    }
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(initQuillEditor, 100);
  });

  // Re-initialize after HTMX content swap
  document.body.addEventListener('htmx:afterSwap', function(event) {
    setTimeout(initQuillEditor, 100);
    setTimeout(initSubmissionEditors, 100);
  });

  // Initialize Quill editors for assignment submissions
  let submissionEditors = {};
  
  function initSubmissionEditors() {
    document.querySelectorAll('[id^="quill-submission-editor-"]').forEach(function(editorContainer) {
      const assignmentId = editorContainer.id.replace('quill-submission-editor-', '');
      const hiddenTextarea = document.getElementById('submission-description-' + assignmentId);
      
      if (!hiddenTextarea || submissionEditors[assignmentId]) {
        return;
      }

      // Initialize Quill
      submissionEditors[assignmentId] = new Quill(editorContainer, {
        theme: 'snow',
        placeholder: 'Enter your answer with formatting...',
        modules: {
          toolbar: [
            [{ 'header': [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            [{ 'indent': '-1'}, { 'indent': '+1' }],
            [{ 'align': [] }],
            [{ 'color': [] }, { 'background': [] }],
            ['link'],
            ['clean']
          ]
        }
      });

      // Set initial content if editing
      const initialContent = hiddenTextarea.value;
      if (initialContent) {
        submissionEditors[assignmentId].root.innerHTML = initialContent;
      }

      // Sync content to hidden textarea on change
      submissionEditors[assignmentId].on('text-change', function() {
        hiddenTextarea.value = submissionEditors[assignmentId].root.innerHTML;
      });
    });
  }

  // Show submission form
  function showSubmissionForm(assignmentId, existingContent = null) {
    // Hide all assignment cards except the one being submitted
    document.querySelectorAll('.assignment-card').forEach(function(card) {
      const formInCard = card.querySelector('#submission-form-' + assignmentId);
      if (!formInCard) {
        card.style.display = 'none';
      }
    });

    // Show the submission form with full width
    const form = document.getElementById('submission-form-' + assignmentId);
    if (form) {
      form.style.display = 'block';
      form.style.width = '100%';
      form.style.maxWidth = '100%';
      
      // Show the submission header
      const header = document.getElementById('submission-header-' + assignmentId);
      if (header) {
        header.style.display = 'flex';
      }
      
      // Initialize editor if not already done
      setTimeout(function() {
        const editorContainer = document.getElementById('quill-submission-editor-' + assignmentId);
        const hiddenTextarea = document.getElementById('submission-description-' + assignmentId);
        
        if (editorContainer && hiddenTextarea) {
          if (!submissionEditors[assignmentId]) {
            // Clear any existing content
            editorContainer.innerHTML = '';
            
            // Initialize Quill
            submissionEditors[assignmentId] = new Quill(editorContainer, {
              theme: 'snow',
              placeholder: 'Enter your answer with formatting...',
              modules: {
                toolbar: [
                  [{ 'header': [1, 2, 3, false] }],
                  ['bold', 'italic', 'underline', 'strike'],
                  [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                  [{ 'indent': '-1'}, { 'indent': '+1' }],
                  [{ 'align': [] }],
                  [{ 'color': [] }, { 'background': [] }],
                  ['link'],
                  ['clean']
                ]
              }
            });

            // Sync content to hidden textarea on change
            submissionEditors[assignmentId].on('text-change', function() {
              hiddenTextarea.value = submissionEditors[assignmentId].root.innerHTML;
            });
          }
          
          // Set content (for both new and existing editors)
          const contentToSet = existingContent || hiddenTextarea.value || '';
          if (contentToSet) {
            submissionEditors[assignmentId].root.innerHTML = contentToSet;
            hiddenTextarea.value = contentToSet;
          }
        }
      }, 200);
    }

    // Hide the submit button
    const submitBtn = document.getElementById('submit-btn-' + assignmentId);
    if (submitBtn) {
      submitBtn.style.display = 'none';
    }
  }

  // Hide submission form
  function hideSubmissionForm(assignmentId) {
    // Show all assignment cards
    document.querySelectorAll('.assignment-card').forEach(function(card) {
      card.style.display = 'block';
    });

    // Hide the submission form
    const form = document.getElementById('submission-form-' + assignmentId);
    if (form) {
      form.style.display = 'none';
    }

    // Hide the submission header if no submission exists
    const header = document.getElementById('submission-header-' + assignmentId);
    const submittedSection = document.querySelector('.assignment-card-submission-box');
    if (header && !submittedSection) {
      header.style.display = 'none';
    }

    // Show the submit button
    const submitBtn = document.getElementById('submit-btn-' + assignmentId);
    if (submitBtn) {
      submitBtn.style.display = 'flex';
    }
  }

  // Handle submission form submit
  function handleSubmissionSubmit(event, assignmentId, moduleRunId, status) {
    event.preventDefault();
    
    const form = event.target;
    const submitBtn = document.getElementById('submit-btn-form-' + assignmentId);
    
    // Show loading state
    if (submitBtn) {
      submitBtn.disabled = true;
      const icon = submitBtn.querySelector('.btn-icon');
      const spinner = submitBtn.querySelector('.btn-spinner');
      const text = submitBtn.querySelector('.btn-text');
      if (icon) icon.style.display = 'none';
      if (spinner) spinner.style.display = 'block';
      if (text) text.textContent = 'Submitting...';
    }
    
    const formData = new FormData(form);
    
    // Add status to form data
    formData.set('status', status || 'submitted');
    
    // Ensure description is synced
    const editor = submissionEditors[assignmentId];
    const hiddenTextarea = document.getElementById('submission-description-' + assignmentId);
    if (editor && hiddenTextarea) {
      const content = editor.root.innerHTML;
      hiddenTextarea.value = content;
      formData.set('description', content);
      console.log('Submitting description:', content);
    } else {
      console.error('Editor or textarea not found for assignment:', assignmentId);
    }

    // Get CSRF token from form or cookie
    let csrfToken = form.querySelector('[name=csrfmiddlewaretoken]');
    if (csrfToken) {
      csrfToken = csrfToken.value;
    } else {
      csrfToken = getCookie('csrftoken');
    }

    console.log('Submitting to:', '/student/submit-assignment/' + assignmentId + '/', 'Status:', status);
    console.log('FormData entries:', Array.from(formData.entries()));

    // Submit via fetch
    fetch('/student/submit-assignment/' + assignmentId + '/', {
      method: 'POST',
      headers: {
        'X-CSRFToken': csrfToken,
      },
      body: formData,
      credentials: 'same-origin'
    })
    .then(response => {
      console.log('Response status:', response.status);
      if (response.ok) {
        return response.text();
      }
      if (response.status === 403) {
        throw new Error('Authentication failed. Please refresh the page and try again.');
      }
      throw new Error('Submission failed with status: ' + response.status);
    })
    .then(html => {
      console.log('Submission successful, updating UI');
      // Reload the assignments panel
      const detailDrawer = document.querySelector('[id$="detail-drawer"]');
      if (detailDrawer) {
        detailDrawer.innerHTML = html;
        setTimeout(function() {
          initQuillEditor();
          initSubmissionEditors();
        }, 100);
      } else {
        // If no drawer, reload the page
        window.location.reload();
      }
    })
    .catch(error => {
      // Reset button state on error
      if (submitBtn) {
        submitBtn.disabled = false;
        const icon = submitBtn.querySelector('.btn-icon');
        const spinner = submitBtn.querySelector('.btn-spinner');
        const text = submitBtn.querySelector('.btn-text');
        if (icon) icon.style.display = 'block';
        if (spinner) spinner.style.display = 'none';
        if (text) text.textContent = 'Submit';
      }
      alert('Error submitting assignment: ' + error.message);
      console.error('Submission error:', error);
    });
  }

  // Handle Save Draft button
  function handleSaveDraft(event, assignmentId, moduleRunId) {
    event.preventDefault();
    
    const draftBtn = document.getElementById('save-draft-btn-' + assignmentId);
    
    // Show loading state
    if (draftBtn) {
      draftBtn.disabled = true;
      const icon = draftBtn.querySelector('.btn-icon');
      const spinner = draftBtn.querySelector('.btn-spinner');
      const text = draftBtn.querySelector('.btn-text');
      if (icon) icon.style.display = 'none';
      if (spinner) spinner.style.display = 'block';
      if (text) text.textContent = 'Saving...';
    }
    
    const form = document.getElementById('assignment-submission-form-' + assignmentId);
    const formData = new FormData(form);
    
    // Set status to draft
    formData.set('status', 'draft');
    
    // Ensure description is synced
    const editor = submissionEditors[assignmentId];
    const hiddenTextarea = document.getElementById('submission-description-' + assignmentId);
    if (editor && hiddenTextarea) {
      const content = editor.root.innerHTML;
      hiddenTextarea.value = content;
      formData.set('description', content);
      console.log('Saving draft with description:', content);
    } else {
      console.error('Editor or textarea not found for assignment:', assignmentId);
    }

    // Get CSRF token from form or cookie
    let csrfToken = form.querySelector('[name=csrfmiddlewaretoken]');
    if (csrfToken) {
      csrfToken = csrfToken.value;
    } else {
      csrfToken = getCookie('csrftoken');
    }

    console.log('Saving draft to:', '/student/submit-assignment/' + assignmentId + '/');

    // Submit via fetch
    fetch('/student/submit-assignment/' + assignmentId + '/', {
      method: 'POST',
      headers: {
        'X-CSRFToken': csrfToken,
      },
      body: formData,
      credentials: 'same-origin'
    })
    .then(response => {
      console.log('Response status:', response.status);
      if (response.ok) {
        return response.text();
      }
      if (response.status === 403) {
        throw new Error('Authentication failed. Please refresh the page and try again.');
      }
      throw new Error('Draft save failed with status: ' + response.status);
    })
    .then(html => {
      console.log('Draft saved successfully, updating UI');
      // Reload the assignments panel
      const detailDrawer = document.querySelector('[id$="detail-drawer"]');
      if (detailDrawer) {
        detailDrawer.innerHTML = html;
        setTimeout(function() {
          initQuillEditor();
          initSubmissionEditors();
        }, 100);
      } else {
        // If no drawer, reload the page
        window.location.reload();
      }
      // Show success message
      alert('Draft saved successfully!');
    })
    .catch(error => {
      // Reset button state on error
      if (draftBtn) {
        draftBtn.disabled = false;
        const icon = draftBtn.querySelector('.btn-icon');
        const spinner = draftBtn.querySelector('.btn-spinner');
        const text = draftBtn.querySelector('.btn-text');
        if (icon) icon.style.display = 'block';
        if (spinner) spinner.style.display = 'none';
        if (text) text.textContent = 'Save Draft';
      }
      alert('Error saving draft: ' + error.message);
      console.error('Draft save error:', error);
    });

    return false;
  }

  // Handle Discard Changes button
  function handleDiscardChanges(assignmentId) {
    if (confirm('Are you sure you want to discard all changes? This action cannot be undone.')) {
      // Clear the editor content
      const editor = submissionEditors[assignmentId];
      if (editor) {
        editor.setContents([]);
      }
      
      // Hide the submission form
      hideSubmissionForm(assignmentId);
      
      console.log('Changes discarded for assignment:', assignmentId);
    }
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(initSubmissionEditors, 100);
  });
</script>
<script>
  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(";").shift();
    return null;
  }

  document.addEventListener("htmx:configRequest", (event) => {
    const token = getCookie("csrftoken");
    if (token) {
      event.detail.headers["X-CSRFToken"] = token;
    }
  });

  function confirmDelete(type) {
    return confirm("Are you sure you want to delete this " + type + "? This action cannot be undone.");
  }

  function closeModuleDetailDrawer(button) {
    const detailDrawer = button.closest("[id$='detail-drawer']");
    if (detailDrawer) {
      detailDrawer.innerHTML = "";
    }

    const assignmentsGrid = document.getElementById("assignments-grid-view");
    if (assignmentsGrid) {
      assignmentsGrid.style.display = "block";
    }

    const facultyGrid = document.getElementById("faculty-modules-grid-view");
    if (facultyGrid) {
      facultyGrid.style.display = "block";
    }

    const studentGrid = document.getElementById("student-modules-grid-view");
    if (studentGrid) {
      studentGrid.style.display = "block";
    }
  }

  const tabButtons = document.querySelectorAll(".tab-link");
  const tabPanels = document.querySelectorAll(".tab-panel");
  const initialActiveTab = document.body.dataset.activeTab || "dashboard";

  tabButtons.forEach((button) => {
    button.addEventListener("click", () => {
      const target = button.dataset.tab + "-panel";

      tabButtons.forEach((item) => item.classList.remove("active"));
      tabPanels.forEach((panel) => panel.classList.remove("active"));

      button.classList.add("active");
      document.getElementById(target).classList.add("active");
      if (window.history.replaceState) {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("tab", button.dataset.tab);
        if (button.dataset.tab !== "faculty" && button.dataset.tab !== "students") {
          nextUrl.searchParams.delete("mode");
          nextUrl.searchParams.delete("role");
          nextUrl.searchParams.delete("user_id");
        }
        window.history.replaceState({}, "", nextUrl);
      }
    });
  });

  tabButtons.forEach((item) => item.classList.remove("active"));
  tabPanels.forEach((panel) => panel.classList.remove("active"));
  const initialButton = document.querySelector(`.tab-link[data-tab="${initialActiveTab}"]`);
  const initialPanel = document.getElementById(`${initialActiveTab}-panel`);
  if (initialButton && initialPanel) {
    initialButton.classList.add("active");
    initialPanel.classList.add("active");
  }

  document.addEventListener("click", (event) => {
    const quartersButton = event.target.closest(".toggle-quarters");
    if (quartersButton) {
      const target = document.getElementById(quartersButton.dataset.target);
      const isVisible = target.classList.toggle("visible");
      quartersButton.textContent = isVisible ? "Hide Quarters" : "Show Quarters";
      return;
    }

    const actionButton = event.target.closest(".action-menu-button");
    if (actionButton) {
      event.stopPropagation();
      const menu = actionButton.nextElementSibling;
      const isOpen = menu.classList.contains("open");
      document.querySelectorAll(".action-menu").forEach((item) => item.classList.remove("open"));
      if (!isOpen) {
        menu.classList.add("open");
      }
      return;
    }

    document.querySelectorAll(".action-menu").forEach((menu) => menu.classList.remove("open"));
  });

  // Module tabs functionality
  document.addEventListener("click", (event) => {
    const tabButton = event.target.closest(".module-tab-button");
    if (tabButton) {
      const targetTab = tabButton.dataset.tab;
      
      // Remove active class from all buttons and contents
      document.querySelectorAll(".module-tab-button").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll(".module-tab-content").forEach(content => content.classList.remove("active"));
      
      // Add active class to clicked button and corresponding content
      tabButton.classList.add("active");
      const targetContent = document.getElementById(targetTab);
      if (targetContent) {
        targetContent.classList.add("active");
      }
      
      // Toggle between Add Assignment and Publish buttons based on active tab
      const addAssignmentBtn = document.getElementById('add-assignment-btn');
      const publishBtn = document.getElementById('publish-materials-btn');
      
      if (addAssignmentBtn && publishBtn) {
        if (targetTab === 'readings-tab') {
          // Show Publish button, hide Add Assignment button
          addAssignmentBtn.style.display = 'none';
          publishBtn.style.display = 'flex';
        } else {
          // Show Add Assignment button, hide Publish button
          addAssignmentBtn.style.display = 'flex';
          publishBtn.style.display = 'none';
        }
      }
      
      return;
    }

    const toggle = event.target.closest("[data-password-toggle]");
    if (!toggle) return;
    const container = toggle.closest("[data-password-container]") || toggle.parentElement;
    if (!container) return;
    const valueEl = container.querySelector("[data-password-value]");
    if (!valueEl) return;
    const isHidden = valueEl.dataset.hidden === "1";
    if (isHidden) {
      valueEl.textContent = valueEl.dataset.password;
      valueEl.dataset.hidden = "0";
      toggle.textContent = "Hide";
    } else {
      valueEl.textContent = "********";
      valueEl.dataset.hidden = "1";
      toggle.textContent = "Show";
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".message").forEach((el) => {
      const text = el.textContent || "";
      const marker = "Password:";
      const idx = text.indexOf(marker);
      if (idx === -1) return;
      const password = text.slice(idx + marker.length).trim();
      if (!password) return;
      const prefix = text.slice(0, idx + marker.length).trim();
      el.innerHTML = "";
      const span = document.createElement("span");
      span.textContent = prefix + " ";
      const value = document.createElement("span");
      value.setAttribute("data-password-value", "1");
      value.dataset.password = password;
      value.dataset.hidden = "1";
      value.textContent = "********";
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "button button-secondary";
      btn.style.marginLeft = "10px";
      btn.setAttribute("data-password-toggle", "1");
      btn.textContent = "Show";
      el.appendChild(span);
      el.appendChild(value);
      el.appendChild(btn);
    });
  });
</script>
